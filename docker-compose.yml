services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: emotion-bench-web:dev
    init: true
    user: "1000:1000"
    ports:
      - "${WEB_PORT:-18080}:8000"
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      BENCH_ROOT: /workspace
      DATABASE_URL: "${DATABASE_URL:-sqlite:////workspace/storage/bench.db}"
      CONFIG_PATH: /workspace/config.yaml
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: emotion-bench-web:dev
    init: true
    user: "1000:1000"
    profiles: ["worker"]
    environment:
      BENCH_ROOT: /workspace
      DATABASE_URL: "${DATABASE_URL:-sqlite:////workspace/storage/bench.db}"
      CONFIG_PATH: /workspace/config.yaml
      EVAL_IMAGE: "${EVAL_IMAGE:-emotion-bench-eval:dev}"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command: ["python", "-m", "worker.runner"]
    restart: unless-stopped
