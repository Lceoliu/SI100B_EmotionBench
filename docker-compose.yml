services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: emotion-bench-web:dev
    init: true
    user: "1000:1000"
    ports:
      - "${WEB_PORT:-18080}:8000"
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      BENCH_ROOT: /workspace
      HOST_BENCH_ROOT: /home/SI100B_26Fall/emotion-bench
      DATABASE_URL: "${DATABASE_URL:-sqlite:////workspace/storage/bench.db}"
      CONFIG_PATH: /workspace/config.yaml
      FRONTEND_DIST: /workspace/frontend/dist
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY in .env}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-0}"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: emotion-bench-web:dev
    init: true
    user: "1000:1000"
    group_add:
      - "126"
    profiles: ["worker"]
    environment:
      BENCH_ROOT: /workspace
      HOST_BENCH_ROOT: /home/SI100B_26Fall/emotion-bench
      DATABASE_URL: "${DATABASE_URL:-sqlite:////workspace/storage/bench.db}"
      CONFIG_PATH: /workspace/config.yaml
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY in .env}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-0}"
      EVAL_IMAGE: "${EVAL_IMAGE:-emotion-bench-eval:dev}"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command: ["python", "-m", "worker.runner"]
    restart: unless-stopped


  gpu-monitor:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: emotion-bench-web:dev
    init: true
    user: "1000:1000"
    gpus: all
    environment:
      BENCH_ROOT: /workspace
      GPU_MONITOR_INTERVAL_SECONDS: "5"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["python", "scripts/gpu_monitor.py"]
    restart: unless-stopped


  eval-image:
    build:
      context: .
      dockerfile: docker/eval.Dockerfile
    image: emotion-bench-eval:dev
    gpus: all
    profiles: ["eval"]
    entrypoint: ["python", "/gpu_smoke_test.py"]
